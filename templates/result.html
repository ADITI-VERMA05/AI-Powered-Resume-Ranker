<!DOCTYPE html>
<html>
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="container">

<h2>Ranking Results</h2>

<h3>Candidate: {{ ranked[0]["name"] }}</h3>

<table>
<tr>
    <th>Rank</th>
    <th>Resume</th>
    <th>Similarity</th>
    <th>Skill Score</th>
    <th>Final Score</th>
</tr>

{% for i in range(ranked|length) %}
<tr {% if i == 0 %} class="top-row" {% endif %}>
    <td>{{ i+1 }}</td>
    <td>{{ ranked[i]["name"] }}</td>
    <td>{{ ranked[i]["similarity"] }}</td>
    <td>{{ ranked[i]["skill"] }}</td>
    <td><b>{{ ranked[i]["final_score"] }}</b></td>
</tr>
{% endfor %}

</table>

<a href="/download">Download Report</a>
<br>
<a href="/" class="back-btn">Go Back</a>

</div>
</body>
</html>
