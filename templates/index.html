<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Ranker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
<div class="container">

<h2>AI-Powered Resume Ranker</h2>

<form action="/upload" method="post" enctype="multipart/form-data">
    
    <label>Job Description:</label>
    <textarea name="job_desc" rows="8" required></textarea>

    <label>Upload Resumes (PDF):</label>
    <input type="file" name="resumes" multiple required>

    <button type="submit">Rank Resumes</button>

</form>

</div>
</body>
</html>
